{% macro render_search_form(form_id, hint_text, submit_text) %}
<form id="{{ form_id }}" class="query-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

  <div class="form-group">
    <label for="hnInput" class="form-label">Hospital Number (HN):</label>
    <div class="hn-input-wrapper">
      <input
        type="text"
        id="hnInput"
        name="hn"
        class="form-input"
        placeholder="กรอกหมายเลข HN เช่น 0083193"
        pattern="[0-9]+"
        inputmode="numeric"
        autocomplete="off"
        required
      />
    </div>
    <span class="form-hint">{{ hint_text }}</span>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary" id="submitBtn">
      <span class="material-symbols-rounded">search</span>
      {{ submit_text }}
    </button>
    <button type="reset" class="btn btn-outline" id="resetBtn">
      <span class="material-symbols-rounded">restart_alt</span>
      ล้าง
    </button>
  </div>
</form>
{% endmacro %}
