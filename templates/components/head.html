{# templates/components/head.html - Central
<head>
  section #}
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="{% block meta_description %}Project Echo - ระบบจัดการข้อมูล{% endblock %}"
  />

  {# Thai Language Support - Noto Sans Thai #}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
    rel="stylesheet"
  />

  {# Theme and Core Styles #}
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/theme.css') }}"
  />
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/main.css') }}"
  />

  {# Page-specific styles #} {% block extra_css %}{% endblock %} {# Favicon #}
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>"
  />

  <title>{% block title %}Project Echo{% endblock %}</title>
</head>
